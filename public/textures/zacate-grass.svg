<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e7d32"/>
      <stop offset="1" stop-color="#1b5e20"/>
    </linearGradient>
    <pattern id="blades" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M6 48 C10 30, 16 20, 24 2" stroke="#7ed957" stroke-width="2" stroke-linecap="round"/>
      <path d="M16 48 C22 34, 30 24, 42 6" stroke="#9be66f" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 42 C14 28, 24 22, 34 8" stroke="#4cb34f" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M28 48 C24 36, 24 24, 26 10" stroke="#3f9b43" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="8" cy="8" r="1" fill="#b4f08b" opacity="0.45"/>
      <circle cx="34" cy="18" r="1" fill="#b4f08b" opacity="0.35"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="720" height="720" fill="url(#bg)"/>
  <rect width="720" height="720" fill="url(#blades)" opacity="0.9"/>
  <rect width="720" height="720" filter="url(#grain)"/>
</svg>
